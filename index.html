<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess Opening Trainer</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:8px}
header{text-align:center;padding:4px 0}
h1{font-size:1.1em;margin-bottom:6px;color:#e94560}
.tab-bar{display:flex;gap:4px;justify-content:center;margin-bottom:6px}
.tab-bar button{padding:7px 14px;border:2px solid #e94560;background:transparent;color:#eee;border-radius:20px;font-size:.85em;cursor:pointer;transition:all .2s}
.tab-bar button.active{background:#e94560;color:#fff}
#xp-bar{background:#16213e;border-radius:8px;padding:6px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
#xp-bar .level-badge{background:#e94560;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.75em;font-weight:700;flex-shrink:0}
#xp-bar .xp-info{flex:1;min-width:0}
#xp-bar .level-name{font-size:.7em;color:#e94560;font-weight:600}
.xp-progress{width:100%;height:5px;background:#333;border-radius:3px;overflow:hidden;margin-top:2px}
.xp-progress-fill{height:100%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:3px;transition:width .5s}
#xp-bar .xp-text{font-size:.65em;color:#888;margin-top:1px}
.streak-badge{display:flex;align-items:center;gap:3px;font-size:.8em;font-weight:700;color:#ffd700;flex-shrink:0}
.streak-badge .fire{font-size:1.1em}
#line-name{font-size:.82em;color:#aaa;text-align:center;min-height:1.3em;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#board-wrapper{position:relative;width:100%;margin:0 auto}
#board{width:100%}
#board-arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#intro-card{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(0,0,0,0.85);color:#fff;padding:20px 28px;border-radius:14px;text-align:center;max-width:85%;min-width:200px}
#intro-card .intro-name{font-size:1.1em;font-weight:700;margin-bottom:6px;color:#e94560}
#intro-card .intro-desc{font-size:.82em;color:#ccc;line-height:1.4;margin-bottom:6px}
#intro-card .intro-trap{display:inline-block;background:#ff5252;color:#fff;font-size:.7em;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:1px;margin-top:4px}
.board-b72b1 .white-1e1d7{background-color:#EEEED2 !important}
.board-b72b1 .black-3c85d{background-color:#769656 !important}
.highlight-last{box-shadow:inset 0 0 0 100px rgba(255,255,0,0.3)!important}
.highlight-hint{box-shadow:inset 0 0 0 4px #00d2ff!important}
.highlight-selected{box-shadow:inset 0 0 0 100px rgba(255,255,0,0.4)!important}
.highlight-legal{background-image:radial-gradient(circle,rgba(0,0,0,.2) 24%,transparent 25%)!important;background-size:100% 100%!important}
.highlight-legal-capture{box-shadow:inset 0 0 0 5px rgba(0,0,0,.2)!important;border-radius:0!important}
#status{text-align:center;padding:8px;font-size:.95em;min-height:2.5em;display:flex;align-items:center;justify-content:center}
#status.correct{color:#00e676}
#status.wrong{color:#ff5252}
#status.info{color:#64b5f6}
#status.neutral{color:#aaa}
.controls{display:flex;gap:5px;justify-content:center;padding:3px 0;flex-wrap:wrap}
.controls button{padding:9px 12px;border:none;border-radius:8px;font-size:.82em;cursor:pointer;transition:all .15s;font-weight:600}
.btn-hint{background:#0f3460;color:#00d2ff}
.btn-explain{background:#1a1a4e;color:#bb86fc}
.btn-next{background:#e94560;color:#fff}
.btn-retry{background:#533483;color:#fff}
.btn-menu{background:#16213e;color:#aaa}
.btn-undo{background:#2a2a3e;color:#ffd700}
.btn-report{background:#2a1a1a;color:#ff8a80;font-size:.72em!important}
.controls button:active{transform:scale(.95);opacity:.8}
#move-list{padding:6px 8px;margin:6px 0;background:#16213e;border-radius:8px;font-size:.78em;min-height:2em;line-height:1.6;color:#aaa;max-height:70px;overflow-y:auto}
#move-list .move-number{color:#666}
#move-list .white-move{color:#ddd}
#move-list .black-move{color:#bbb}
#explanation-box{display:none;padding:8px 10px;margin:4px 0;background:#1a1a4e;border-left:3px solid #bb86fc;border-radius:0 8px 8px 0;font-size:.82em;color:#bb86fc}
#stats-panel{padding:8px 10px;margin:6px 0;background:#16213e;border-radius:8px}
.stats-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:.78em}
.stats-label{color:#888}
.stats-value{color:#eee;font-weight:600}
.accuracy-bar{width:100%;height:5px;background:#333;border-radius:3px;margin-top:3px;overflow:hidden}
.accuracy-fill{height:100%;background:linear-gradient(90deg,#e94560,#00e676);border-radius:3px;transition:width .5s}
#line-selector{display:none;padding:6px}
#line-selector h3{font-size:.85em;color:#e94560;margin-bottom:6px}
.cat-label{font-size:.72em;color:#888;margin:8px 0 3px;text-transform:uppercase;letter-spacing:.5px}
.line-item{padding:8px 10px;margin:3px 0;background:#16213e;border-radius:8px;cursor:pointer;font-size:.8em;display:flex;justify-content:space-between;align-items:center;border:1px solid transparent;gap:6px}
.line-item:active{background:#1a1a4e}
.line-item .line-info{flex:1;min-width:0}
.line-item .line-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.line-item .line-acc{font-size:.7em;color:#888;flex-shrink:0}
.line-item.trap{border-left:3px solid #ff5252}
.line-item .line-tag{color:#ff5252;font-size:.65em;font-weight:600}
.line-item .stars{color:#ffd700;font-size:.7em;flex-shrink:0;margin-left:4px}
#result-screen{display:none;text-align:center;padding:16px 10px}
#result-screen h2{color:#e94560;margin-bottom:6px;font-size:1.2em}
#result-screen p{color:#aaa;font-size:.85em;margin-bottom:3px}
.result-stat{font-size:1.8em;font-weight:bold;margin:8px 0}
.result-stat.perfect{color:#00e676}
.result-stat.good{color:#ffd700}
.result-stat.needs-work{color:#ff5252}
#xp-gained{font-size:1em;color:#ffd700;font-weight:700;margin:6px 0;opacity:0;transition:opacity .3s}
#xp-gained.show{opacity:1}
#level-up{display:none;text-align:center;padding:10px;margin:6px 0;background:linear-gradient(135deg,#533483,#e94560);border-radius:12px;animation:pulse .6s ease-in-out}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
#level-up h3{color:#fff;font-size:1em}
#level-up p{color:#ffcdd2;font-size:.8em}
@media(max-width:500px){#app{padding:4px}}
</style>
</head>
<body>
<div id="app">
  <div id="xp-bar">
    <div class="level-badge" id="level-num">1</div>
    <div class="xp-info">
      <div class="level-name" id="level-name">Pawn</div>
      <div class="xp-progress"><div class="xp-progress-fill" id="xp-fill" style="width:0%"></div></div>
      <div class="xp-text" id="xp-text">0 / 200 XP</div>
    </div>
    <div class="streak-badge" id="streak-badge" style="display:none">
      <span class="fire">*</span><span id="streak-count">0</span>d
    </div>
  </div>
  <header>
    <h1>Chess Opening Trainer</h1>
    <div class="tab-bar">
      <button id="tab-ponziani" class="active" onclick="app.switchOpening('ponziani')">Ponziani (White)</button>
      <button id="tab-hippo" onclick="app.switchOpening('hippo')">Hippo (Black)</button>
    </div>
  </header>
  <div id="line-name"></div>
  <div id="board-wrapper"><div id="board"></div><svg id="board-arrows" xmlns="http://www.w3.org/2000/svg"></svg><div id="intro-card"><div class="intro-name"></div><div class="intro-desc"></div></div></div>
  <div id="status" class="neutral">Tap a piece to make your move</div>
  <div id="explanation-box"></div>
  <div class="controls" id="drill-controls">
    <button class="btn-hint" onclick="app.hint()">Hint</button>
    <button class="btn-explain" onclick="app.explain()">Why?</button>
    <button class="btn-next" onclick="app.nextLine()" style="display:none" id="btn-next">Next Line</button>
    <button class="btn-retry" onclick="app.retryLine()" style="display:none" id="btn-retry">Retry</button>
    <button class="btn-undo" onclick="app.undo()">Undo</button>
    <button class="btn-menu" onclick="app.showLineSelector()">Lines</button>
    <button class="btn-report" onclick="app.reportError()">Report</button>
    <button class="btn-report" onclick="app.showErrorLog()">Errors</button>
  </div>
  <div id="move-list"></div>
  <div id="stats-panel">
    <div class="stats-row"><span class="stats-label">Session Accuracy</span><span class="stats-value" id="stat-accuracy">--</span></div>
    <div class="stats-row"><span class="stats-label">Lines Completed</span><span class="stats-value" id="stat-completed">0</span></div>
    <div class="stats-row"><span class="stats-label">Perfect Streak</span><span class="stats-value" id="stat-streak">0</span></div>
    <div class="stats-row"><span class="stats-label">Avg Speed</span><span class="stats-value" id="stat-speed">--</span></div>
    <div class="accuracy-bar"><div class="accuracy-fill" id="accuracy-fill" style="width:0%"></div></div>
  </div>
  <div id="line-selector"></div>
  <div id="error-log" style="display:none;padding:8px;margin:6px 0">
    <h3 style="font-size:.85em;color:#ff8a80;margin-bottom:6px">Error Reports
      <button onclick="app.shareErrors()" style="float:right;background:#0f3460;color:#00d2ff;border:none;border-radius:6px;padding:4px 10px;font-size:.78em;cursor:pointer;font-weight:600;margin-left:4px">Share</button>
      <button onclick="app.clearErrors()" style="float:right;background:#2a1a1a;color:#ff8a80;border:1px solid #ff8a80;border-radius:6px;padding:3px 8px;font-size:.75em;cursor:pointer">Clear</button>
    </h3>
    <div id="error-list" style="font-size:.72em;color:#aaa"></div>
  </div>
  <div id="result-screen">
    <h2 id="result-title"></h2>
    <p id="result-desc"></p>
    <div class="result-stat" id="result-accuracy"></div>
    <p id="result-detail"></p>
    <div id="xp-gained"></div>
    <div id="level-up"><h3 id="levelup-title"></h3><p id="levelup-desc"></p></div>
    <div class="controls" style="margin-top:10px">
      <button class="btn-retry" onclick="app.retryLine()">Retry</button>
      <button class="btn-next" onclick="app.nextLine()">Next Line</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script>
'use strict';

// ===================== OPENING DATA =====================
// L(id,name,desc,result,trap,cat,moves,explanations)
function L(id,name,desc,result,trap,cat,moves,explanations){return{id:id,name:name,description:desc,result:result,isTrap:!!trap,cat:cat,moves:moves,explanations:explanations}}

var PONZIANI_LINES=[
// === MAIN LINES ===
L('ponz-main-nxe4','Main Line: 3...Nf6 4.d4 Nxe4','Black grabs e4. White gains space with d5.','White has a comfortable space advantage with the d5 wedge.',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','Nxe4','d5','Ne7','Nxe5','Ng6','Bd3','Nf6','O-O'],
{6:'Execute the plan behind c3 -- seize the center with d4+e4.',8:'Kick the knight away. The d5 pawn cramps Black.',10:'Recapture the pawn with a strong d5 wedge.',12:'Develop actively to d3, eyeing the kingside. Also sets the Nxf2 trap!',14:'Castle to safety. Excellent development and more space.'}),

L('ponz-main-deep','Main Line Deep: After 8.O-O Be7','Extended main line showing White\'s Re1 and Nd2 plan.','White has a lasting space advantage with the d5 wedge and active pieces.',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','Nxe4','d5','Ne7','Nxe5','Ng6','Bd3','Nf6','O-O','Be7','Re1','O-O','Nd2','Nxe5','Rxe5','d6','Re1'],
{6:'Seize the center with d4.',8:'Kick the knight and gain space.',10:'Recapture on e5.',12:'Develop to d3 -- active bishop.',14:'Castle to safety.',16:'Place the rook on the open e-file.',18:'Reroute the knight: Nd2 heading to f1-g3 or c4.',20:'Recapture with the rook, maintaining control of the e-file.',22:'Pull the rook back. White has a lasting positional edge.'}),

L('ponz-main-positional','Positional: Nxg6 Qd4 Qxe4+ (Win Knight!)','After Nxg6 and Qd4, Black offers a queen trade but Qxe4+ wins the knight with check!','White wins a free knight with Qxe4+. Much better than just trading queens!',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','Nxe4','d5','Ne7','Nxe5','Ng6','Nxg6','hxg6','Qd4','Qf6','Qxe4+','Qe7','Qxe7+','Bxe7','Bf4'],
{6:'Push d4 to seize the center.',8:'Kick the knight away and gain space.',10:'Recapture on e5.',12:'Trade the knight to clear the diagonal.',14:'Centralize the queen.',16:'Qxe4+! Don\'t trade queens! Capture the knight WITH CHECK. Free piece!',18:'Trade queens now. White is up a full knight.',20:'Develop the bishop. White is winning.'}),

L('ponz-gotham-qb3','GothamChess Main: Qb3 + Greek Gift Bxh7+!','THE GothamChess line. After Qb3 and Bd3, the Greek Gift Bxh7+ is devastating!','GREEK GIFT! Bxh7+ Kxh7 Ng5+ Kg8 Qh3 threatens Qh7# and Qh8#. Crushing!',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','exd4','e5','Nd5','Qb3','Nb6','cxd4','d5','exd6','Bxd6','Bd3','O-O','Bxh7+','Kxh7','Ng5+','Kg8','Qh3'],
{6:'Push d4! The whole point of the Ponziani.',8:'Push e5! Kick the knight and grab space.',10:'Qb3! GothamChess\'s key move. Pressures b7 and d5.',12:'Recapture. Massive center.',14:'Capture en passant. Open the position.',16:'Develop to d3 -- aiming at h7!',18:'GREEK GIFT! Bxh7+!! Sacrifice the bishop to rip open the king!',20:'Ng5+! Classic follow-up. King is in a mating net.',22:'Qh3! Threatens Qh7# and Qh8#. Devastating attack.'}),

L('ponz-gotham-exd4-bc5-trap','TRAP: 5.e5 Bc5?? 6.Qa4! (GothamChess)','After 5.e5, Black develops Bc5 but Qa4 is a devastating double attack.','TRAP! Qa4 hits both Nc6 and the bishop. Black loses material.',1,'trap',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','exd4','e5','Bc5','Qa4'],
{6:'Push d4.',8:'Push e5, kicking the knight.',10:'Qa4! Double attack on Nc6 and the undefended Bc5. Black can\'t save both.'}),

L('ponz-main-exd4','Main Line: 3...Nf6 4.d4 exd4 (Book)','The book continuation with cxd4 and Bb4+ (alternative to GothamChess Qb3).','White has a big center with d4+e5. Easy development.',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','exd4','e5','Nd5','cxd4','Bb4+','Bd2','Bxd2+','Qxd2','d6'],
{6:'Push d4, challenging the center.',8:'Advance with tempo! Pawn attacks the f6 knight.',10:'Recapture. Powerful pawn center on d4+e5.',12:'Block the check and develop the bishop.',14:'Recapture with queen, well-placed on d2.'}),

L('ponz-gotham-bg5-trap','TRAP: Bg5 Poisoned e4 (GothamChess)','After 3...Nf6 4.d4 d6 5.d5 Ne7 6.Bg5, the e4 pawn is poisoned!','TRAP! If Black takes e4, Qa4+ forks king and knight. Famous GothamChess trick.',1,'trap',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','d6','d5','Ne7','Bg5','Nxe4','Qa4+','Bd7','Qxe4'],
{6:'Push d4 (if Black doesn\'t play d5, we play d4!).',8:'Push d5! Kick the knight and grab space.',10:'Bg5! THE GothamChess trick. Pins the f6 knight and poisons the e4 pawn.',12:'Qa4+! Fork the king and the knight on e4. Black can\'t save both.',14:'Win the knight back. White is up a clean pawn with a better position.'}),

L('ponz-gotham-bg5-nontrap','Bg5 Line: Black Doesn\'t Take (GothamChess)','After 6.Bg5, if Black plays correctly with ...h6, White still has a great position.','White has space, active bishop pair, and the classic Nf1-g3 kingside setup.',0,'main',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','d6','d5','Ne7','Bg5','h6','Bh4','Ng6','Bg3','Be7','Bd3','O-O','O-O'],
{6:'Push d4.',8:'Push d5! Kick the knight.',10:'Bg5! Even if Black doesn\'t take e4, the pin is annoying.',12:'Retreat to h4, maintaining the pin on the knight.',14:'Retreat to g3. The bishop is well-placed here, controlling e5.',16:'Develop to d3. Aiming at the kingside.',18:'Castle. White has space and the classic kingside attack setup.'}),

L('ponz-gotham-bc5-qa4','GothamChess: 3...Bc5 4.d4 with Qa4+','After 3...Bc5, White gets a huge center. d5 kicks the knight and Qa4+ creates threats.','White has a massive center and the queen creates tactical threats.',0,'main',
['e4','e5','Nf3','Nc6','c3','Bc5','d4','exd4','cxd4','Bb4+','Nc3','Nf6','d5','Ne7','Bd3','d6','Qa4+'],
{6:'Push d4! Challenge the bishop.',8:'Recapture. Big center.',10:'Nc3! Block the check AND develop the knight.',12:'Push d5! Kick the knight to the rim.',14:'Develop actively.',16:'Qa4+! Creates tactical threats including Qxb4 and dxc6.'}),

// === COUNTERGAMBIT ===
L('ponz-countergambit-f6','Countergambit: 3...d5 4.Qa4 f6 (Steinitz)','Black\'s best response with ...f6. Complex middlegame.','Complex middlegame. White has a slight pull with active pieces.',0,'counter',
['e4','e5','Nf3','Nc6','c3','d5','Qa4','f6','Bb5','Ne7','exd5','Qxd5','d4','Bd7'],
{6:'KEY MOVE! Pin the c6 knight. e5 is now under fire.',8:'Pin the knight again and develop actively.',10:'Capture the center pawn with initiative.',12:'Push forward, challenging Black\'s e5 pawn.'}),

L('ponz-countergambit-deep','Steinitz Deep: After 7.d4 Bd7 8.O-O','Extended Steinitz line showing White\'s plan against Black\'s center.','White targets Black\'s overextended center with Re1 and piece pressure.',0,'counter',
['e4','e5','Nf3','Nc6','c3','d5','Qa4','f6','Bb5','Ne7','exd5','Qxd5','d4','Bd7','O-O','e4','Nfd2','f5','Re1'],
{6:'Pin the knight -- always the key move after 3...d5.',8:'Develop the bishop with another pin.',10:'Capture in the center.',12:'Push d4, challenging Black.',14:'Castle to safety.',16:'Knight retreats to d2, preparing to attack Black\'s e4 pawn.',18:'Rook to e1, targeting the weak e4 pawn. White has a plan.'}),

L('ponz-countergambit-bd7','Countergambit: 3...d5 Qa4 Bd7 (Gambit)','Black\'s counter-trick with Nd4 discovered attack.','White is up a pawn but Black has some activity.',0,'counter',
['e4','e5','Nf3','Nc6','c3','d5','Qa4','Bd7','exd5','Nd4','Qd1','Nxf3+','Qxf3','Nf6','Bc4','e4','Qe2'],
{6:'Pin the knight.',8:'Capture the center pawn.',10:'Retreat queen to d1 -- safest square.',12:'Recapture with queen (keeps pawn structure).',14:'Develop bishop actively, defending d5.',16:'Retreat queen. Up a pawn with a good position.'}),

L('ponz-leonhardt','Leonhardt: 3...d5 4.Qa4 Nf6','Black develops the knight aggressively. White grabs e5.','White wins the e5 pawn and has a space advantage.',0,'counter',
['e4','e5','Nf3','Nc6','c3','d5','Qa4','Nf6','Nxe5','Bd6','Nxc6','bxc6','e5','Be7','exf6','Bxf6','Be2'],
{6:'Pin the knight.',8:'Grab the free e5 pawn! The pin on c6 makes it safe.',10:'Capture the knight, destroying Black\'s pawn structure.',12:'Push e5 with tempo, attacking the bishop.',14:'Capture the knight -- White has a clear advantage.',16:'Develop calmly. White is clearly better.'}),

// === TRAPS ===
L('ponz-nxf2-trap','TRAP: Nxf2 (Famous King Hunt)','Black tries to fork queen and rook with Nxf2 -- devastating trap!','TRAP SPRUNG! White wins at least a piece with a king hunt.',1,'trap',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','Nxe4','d5','Ne7','Nxe5','Ng6','Bd3','Nxf2','Bxg6','Nxd1','Bxf7+','Ke7','Bg5+','Kd6','Nc4+','Kc5','Nba3'],
{8:'Kick the knight. Gains space.',10:'Recapture with a strong d5 wedge.',12:'Develop to d3 -- sets the Nxf2 trap!',14:'KEY MOVE! Ignore the queen! Bxg6 is devastating.',16:'Check! King must move, attack is crushing.',18:'Another check! King is hunted across the board.',20:'Knight check, forking the king.',22:'Threatens b4 mate. Black must give back the queen.'}),

L('ponz-d6-trap','TRAP: 5...d6?? (Beginner Blunder)','After 5.d5 Ne7 6.Nxe5, Black plays the natural d6 and gets crushed.','TRAP! Bb5+ wins decisive material. Very common beginner mistake.',1,'trap',
['e4','e5','Nf3','Nc6','c3','Nf6','d4','Nxe4','d5','Ne7','Nxe5','d6','Bb5+','c6','dxc6','bxc6','Nxc6'],
{6:'Push d4.',8:'Kick the knight with d5.',10:'Capture the e5 pawn.',12:'KEY: Bb5+! Pin the pawn. After ...c6, dxc6 destroys Black\'s position.',14:'Capture! Opens up Black\'s position completely.',16:'Take the c6 pawn -- winning massive material.'}),

L('ponz-bc5-trap','TRAP: 5...Bc5?? (Piece Lost)','After 5.d5, Black develops Bc5 but loses a piece to Qa4.','TRAP! Qa4 hits both Nc6 and Ne4 -- Black loses a piece.',1,'trap',

var LEVELS=[
  {name:'Pawn',xp:0},
  {name:'Knight',xp:200},
  {name:'Bishop',xp:500},
  {name:'Rook',xp:1000},
  {name:'Queen',xp:2000},

];

function loadProfile(){
  try{return JSON.parse(localStorage.getItem('chess-trainer-profile'))||{xp:0,dailyStreak:0,lastDay:null,perfectStreak:0}}catch(e){return{xp:0,dailyStreak:0,lastDay:null,perfectStreak:0}}
}
function saveProfile(p){localStorage.setItem('chess-trainer-profile',JSON.stringify(p))}
function getLevel(xp){
  for(var i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp)return i}
  return 0;
}
function checkDailyStreak(){
  var p=loadProfile();
  var today=new Date().toISOString().slice(0,10);
  if(p.lastDay===today)return p;
  var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(p.lastDay===yesterday){p.dailyStreak++}
  else if(p.lastDay!==today){p.dailyStreak=1}
  p.lastDay=today;
  saveProfile(p);
  return p;
}
function awardXP(amount){
  var p=loadProfile();
  var oldLevel=getLevel(p.xp);
  p.xp+=amount;
  var newLevel=getLevel(p.xp);
  saveProfile(p);
  return{oldLevel:oldLevel,newLevel:newLevel,totalXP:p.xp,gained:amount,leveledUp:newLevel>oldLevel};
}

// ===================== SPACED REPETITION =====================
function loadStats(){try{return JSON.parse(localStorage.getItem('chess-trainer-stats'))||{}}catch(e){return{}}}
function saveStats(s){localStorage.setItem('chess-trainer-stats',JSON.stringify(s))}
function getLineStats(id){var s=loadStats();return s[id]||{attempts:0,perfect:0,weight:1.0,mastery:0}}
function updateLineStats(id,totalMoves,correctMoves){
  var s=loadStats();
  var ls=s[id]||{attempts:0,perfect:0,weight:1.0,mastery:0};
  ls.attempts++;
  var acc=correctMoves/Math.max(totalMoves,1);
  if(acc===1){ls.perfect++;ls.weight=Math.max(0.2,ls.weight-0.15);ls.mastery=Math.min(3,ls.perfect)}
  else if(acc>=0.7){ls.weight=Math.max(0.3,ls.weight-0.05)}
  else{ls.weight+=0.4}
  s[id]=ls;
  saveStats(s);
  return ls;
}
function selectWeightedLine(lines){
  var weights=lines.map(function(l){return getLineStats(l.id).weight});
  var total=weights.reduce(function(a,b){return a+b},0);
  var r=Math.random()*total,cum=0;
  for(var i=0;i<weights.length;i++){cum+=weights[i];if(r<=cum)return lines[i]}
  return lines[lines.length-1];
}

// ===================== SOUND ENGINE =====================
var Sound=(function(){
  var ctx=null;
  function getCtx(){if(!ctx)try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return ctx}
  function play(type){
    var c=getCtx();if(!c)return;
    if(c.state==='suspended')c.resume();
    if(type==='move'){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=600;g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start(c.currentTime);o.stop(c.currentTime+0.1)}
    else if(type==='capture'){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=300;g.gain.setValueAtTime(0.25,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.start(c.currentTime);o.stop(c.currentTime+0.15)}
    else if(type==='correct'){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(880,c.currentTime);o.frequency.setValueAtTime(1100,c.currentTime+0.08);g.gain.setValueAtTime(0.15,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start(c.currentTime);o.stop(c.currentTime+0.2)}
    else if(type==='wrong'){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=180;g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start(c.currentTime);o.stop(c.currentTime+0.3)}
    else if(type==='complete'){[660,880,1100,1320].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;var t=c.currentTime+i*0.1;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.15)})}
  }
  return{play:play};
})();

// ===================== APP =====================
var app=(function(){
  var board,game,currentLine,moveIndex,selectedSquare;
  var playerMoveCount,playerCorrectCount,hintUsed,hintsUsedCount;
  var sessionCorrect=0,sessionTotal=0,sessionCompleted=0,perfectStreak=0;
  var currentOpening='ponziani';
  var isAnimating=false;
  var lineSelectMode=false;
  var autoAdvanceTimer=null;
  var moveStartTime=0,sessionMoveTimeTotal=0,sessionMoveCount=0;
  var lineMoveTimeTotal=0,lineMoveCount=0;
  var lastUserAttempt=null;

  // ===================== ARROW SYSTEM =====================
  function getSquareCenter(sq){
    var boardEl=$('#board');
    var boardW=boardEl.width();
    var sqSize=boardW/8;
    var file=sq.charCodeAt(0)-97;
    var rank=parseInt(sq[1])-1;
    var orient=board.orientation();
    var x,y;
    if(orient==='white'){x=file*sqSize+sqSize/2;y=(7-rank)*sqSize+sqSize/2}
    else{x=(7-file)*sqSize+sqSize/2;y=rank*sqSize+sqSize/2}
    return{x:x,y:y};
  }
  function drawArrow(from,to,color){
    var svg=$('#board-arrows')[0];
    var boardEl=$('#board');
    var boardW=boardEl.width();
    svg.setAttribute('viewBox','0 0 '+boardW+' '+boardW);
    var f=getSquareCenter(from),t=getSquareCenter(to);
    var dx=t.x-f.x,dy=t.y-f.y;
    var len=Math.sqrt(dx*dx+dy*dy);
    var ux=dx/len,uy=dy/len;
    var headLen=boardW/8*0.35;
    var shaftW=boardW/8*0.18;
    var headW=boardW/8*0.35;
    var tipX=t.x,tipY=t.y;
    var baseX=t.x-ux*headLen,baseY=t.y-uy*headLen;
    var px=-uy,py=ux;
    var points=[
      (f.x+px*shaftW/2)+','+(f.y+py*shaftW/2),
      (baseX+px*shaftW/2)+','+(baseY+py*shaftW/2),
      (baseX+px*headW/2)+','+(baseY+py*headW/2),
      tipX+','+tipY,
      (baseX-px*headW/2)+','+(baseY-py*headW/2),
      (baseX-px*shaftW/2)+','+(baseY-py*shaftW/2),
      (f.x-px*shaftW/2)+','+(f.y-py*shaftW/2)
    ].join(' ');
    var poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',points);
    poly.setAttribute('fill',color||'rgba(255,170,0,0.8)');
    svg.appendChild(poly);
  }
  function clearArrows(){$('#board-arrows').empty()}

  // ===================== INTRO CARD =====================
  function showIntroCard(line,cb){
    var card=$('#intro-card');
    card.find('.intro-name').text(line.name);
    card.find('.intro-desc').text(line.description);
    card.find('.intro-trap').remove();
    if(line.isTrap)card.append('<div class="intro-trap">TRAP</div>');
    card.fadeIn(200);
    setTimeout(function(){card.fadeOut(300,function(){if(cb)cb()})},2000);
  }

  function init(){
    game=new Chess();
    board=Chessboard('board',{
      draggable:false,position:'start',
      pieceTheme:'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });
    $(window).on('resize',function(){board.resize()});
    // Pure tap-to-move: tap piece to select, tap destination to move
    $('#board').on('click','.square-55d63',function(){
      handleSquareClick($(this).attr('data-square'));
    });
    checkDailyStreak();
    updateXPDisplay();
    updateDailyStreakDisplay();
    loadExplanations();
    startDrill();
  }

  function selectPiece(sq){
    clearHighlights();
    clearArrows();
    selectedSquare=sq;
    highlightSquare(sq,'highlight-selected');
    game.moves({square:sq,verbose:true}).forEach(function(m){
      highlightSquare(m.to,m.captured?'highlight-legal-capture':'highlight-legal');
    });
  }

  function handleSquareClick(sq){
    if(isAnimating||!currentLine)return;
    if(game.turn()!==currentLine.playerColor)return;
    if(moveIndex>=currentLine.moves.length)return;
    var piece=game.get(sq);
    if(selectedSquare){
      if(sq===selectedSquare){clearHighlights();clearArrows();selectedSquare=null;return}
      if(piece&&piece.color===currentLine.playerColor){selectPiece(sq);return}
      tryMove(selectedSquare,sq,currentLine.moves[moveIndex]);
      clearHighlights();clearArrows();
      selectedSquare=null;
    }else{
      if(piece&&piece.color===currentLine.playerColor){selectPiece(sq)}
    }
  }

  function switchOpening(op){
    currentOpening=op;
    $('#tab-ponziani').toggleClass('active',op==='ponziani');
    $('#tab-hippo').toggleClass('active',op==='hippo');
    hideLineSelector();startDrill();
  }

  function getLines(){return ALL_LINES.filter(function(l){return l.opening===currentOpening})}

  function startDrill(specificLine){
    if(autoAdvanceTimer){clearTimeout(autoAdvanceTimer);autoAdvanceTimer=null}
    hideResult();hideLineSelector();
    game.reset();clearHighlights();clearArrows();
    selectedSquare=null;hintUsed=false;hintsUsedCount=0;
    playerMoveCount=0;playerCorrectCount=0;moveIndex=0;
    lineMoveTimeTotal=0;lineMoveCount=0;moveStartTime=0;
    var src=specificLine||selectWeightedLine(getLines());
    currentLine={id:src.id,name:src.name,description:src.description,result:src.result,
      isTrap:src.isTrap,cat:src.cat,opening:src.opening,playerColor:src.playerColor,
      baseMoves:src.baseMoves,flexible:src.flexible,
      moves:src.moves.slice(),explanations:$.extend({},src.explanations)};
    board.orientation(currentLine.playerColor==='w'?'white':'black');
    board.position('start');
    $('#line-name').text(currentLine.name);
    $('#move-list').html('');
    $('#explanation-box').hide();
    $('#btn-next').hide();$('#btn-retry').hide();
    setStatus('Setting up position...','info');
    playBaseMoves();
  }

  function playBaseMoves(){
    if(moveIndex<currentLine.baseMoves&&moveIndex<currentLine.moves.length){
      isAnimating=true;
      var san=currentLine.moves[moveIndex];
      var m=game.move(san);
      if(!m){console.error('Invalid base move:',san,moveIndex,game.fen());moveIndex++;playBaseMoves();return}
      updateMoveList(m,moveIndex);
      board.position(game.fen(),false);
      moveIndex++;
      setTimeout(playBaseMoves,150);
    }else{
      isAnimating=false;
      playNextAutoOrWait();
    }
  }

  function playNextAutoOrWait(){
    if(moveIndex>=currentLine.moves.length){finishLine();return}
    var san=currentLine.moves[moveIndex];
    var turnColor=moveIndex%2===0?'w':'b';
    if(turnColor!==currentLine.playerColor){
      isAnimating=true;
      setTimeout(function(){
        var m=game.move(san);
        if(!m){console.error('Invalid auto move:',san,moveIndex,game.fen());finishLine();return}
        board.position(game.fen());
        highlightLastMove(m);
        drawArrow(m.from,m.to,'rgba(255,170,0,0.8)');
        Sound.play(m.captured?'capture':'move');
        updateMoveList(m,moveIndex);
        moveIndex++;isAnimating=false;
        playNextAutoOrWait();
      },400);
    }else{
      moveStartTime=Date.now();
      setStatus('Your turn -- find the best move!','neutral');
    }
  }


  function tryMove(source,target,expectedSan){
    var testGame=new Chess(game.fen());
    var expectedMove=testGame.move(expectedSan);
    if(!expectedMove){console.error('Expected move invalid:',expectedSan,game.fen());return'snapback'}
    testGame.undo();
    var userMove=testGame.move({from:source,to:target,promotion:'q'});
    if(!userMove)return'snapback';
    lastUserAttempt=userMove.san;
    playerMoveCount++;
    // Track speed
    if(moveStartTime>0){var elapsed=(Date.now()-moveStartTime)/1000;lineMoveTimeTotal+=elapsed;lineMoveCount++;sessionMoveTimeTotal+=elapsed;sessionMoveCount++;moveStartTime=0}
    var isCorrect=userMove.san===expectedMove.san;
    if(!isCorrect&&currentLine.flexible){
      for(var fi=moveIndex+2;fi<currentLine.moves.length;fi+=2){
        if(currentLine.moves[fi]===userMove.san){
          currentLine.moves[fi]=expectedSan;
          currentLine.moves[moveIndex]=userMove.san;
          var tmpExp=currentLine.explanations[fi];
          currentLine.explanations[fi]=currentLine.explanations[moveIndex];
          currentLine.explanations[moveIndex]=tmpExp;
          isCorrect=true;
          break;
        }
      }
    }
    if(isCorrect){
      game.move(userMove.san);
      board.position(game.fen());
      highlightLastMove(userMove);
      updateMoveList(userMove,moveIndex);
      playerCorrectCount++;sessionCorrect++;sessionTotal++;
      moveIndex++;
      Sound.play(userMove.captured?'capture':'move');
      Sound.play('correct');
      setStatus('Correct!','correct');
      updateSessionStats();
      $('#explanation-box').hide();
      setTimeout(playNextAutoOrWait,500);
      return;
    }else{
      sessionTotal++;
      Sound.play('wrong');
      var customExpl=getWrongMoveExplanation(currentLine.id,moveIndex,userMove.san);
      if(customExpl){
        setStatus(expectedSan+' is correct. '+customExpl,'wrong');
        $('#explanation-box').text(customExpl).fadeIn(200);
      }else{
        setStatus('Not quite. The correct move is '+expectedSan,'wrong');
      }
      updateSessionStats();
      showCorrectMoveOnBoard(expectedSan);
      return'snapback';
    }
  }

  function showCorrectMoveOnBoard(san){
    var testGame=new Chess(game.fen());
    var m=testGame.move(san);
    if(m){highlightSquare(m.from,'highlight-hint');highlightSquare(m.to,'highlight-hint');drawArrow(m.from,m.to,'rgba(0,180,0,0.8)')}
    setTimeout(function(){
      clearHighlights();clearArrows();
      game.move(san);
      board.position(game.fen());
      highlightLastMove(m);
      Sound.play(m&&m.captured?'capture':'move');
      updateMoveList(m||{san:san},moveIndex);
      moveIndex++;
      setTimeout(playNextAutoOrWait,600);
    },1500);
  }

  function finishLine(){
    var accuracy=playerMoveCount>0?Math.round((playerCorrectCount/playerMoveCount)*100):100;
    var isPerfect=accuracy===100&&!hintUsed;
    sessionCompleted++;
    perfectStreak=isPerfect?perfectStreak+1:0;
    var ls=updateLineStats(currentLine.id,playerMoveCount,playerCorrectCount);
    var xpBase=isPerfect?100:accuracy>=70?60:30;
    var streakBonus=Math.min(perfectStreak*5,50);
    var hintPenalty=hintsUsedCount*10;
    var xpEarned=Math.max(10,xpBase+streakBonus-hintPenalty);
    checkDailyStreak();
    var result=awardXP(xpEarned);
    updateSessionStats();
    updateXPDisplay();
    updateDailyStreakDisplay();

    Sound.play(isPerfect?'complete':'correct');

    $('#result-title').text(isPerfect?'Perfect!':accuracy>=70?'Good effort!':'Keep practicing!');
    $('#result-desc').text(currentLine.result);
    $('#result-accuracy').text(accuracy+'%').attr('class','result-stat '+(isPerfect?'perfect':accuracy>=70?'good':'needs-work'));
    var detail=playerCorrectCount+'/'+playerMoveCount+' moves correct';
    if(lineMoveCount>0)detail+=' | Avg '+(lineMoveTimeTotal/lineMoveCount).toFixed(1)+'s/move';
    if(hintUsed)detail+=' (hints used)';
    if(ls.mastery>=3)detail+=' | MASTERED';
    $('#result-detail').text(detail);

    var xpMsg='+'+xpEarned+' XP';
    if(streakBonus>0)xpMsg+=' (+'+streakBonus+' streak bonus)';
    $('#xp-gained').text(xpMsg).addClass('show');
    setTimeout(function(){$('#xp-gained').removeClass('show')},2000);

    if(result.leveledUp){
      $('#level-up').show();
      $('#levelup-title').text('Level Up! '+LEVELS[result.newLevel].name);
      $('#levelup-desc').text('Level '+(result.newLevel+1)+' reached!');
    }else{
      $('#level-up').hide();
    }

    var statusMsg=isPerfect?'Perfect! '+xpMsg:accuracy>=70?'Good! '+xpMsg:'Keep practicing. '+xpMsg;
    setStatus(statusMsg,isPerfect?'correct':accuracy>=70?'info':'wrong');
    // Show OK/Report buttons instead of auto-advancing — let user confirm last move
    $('#drill-controls').html('<button class="btn-next" onclick="app.nextLine()" style="flex:1;padding:14px;font-size:1em">OK</button><button class="btn-report" onclick="app.reportError();app.nextLine()" style="flex:1;padding:14px;font-size:.9em">Report &amp; Next</button>').show();
    $('#result-screen').fadeIn(200);
  }

  function hint(){
    if(isAnimating||!currentLine||moveIndex>=currentLine.moves.length)return;
    if((moveIndex%2===0?'w':'b')!==currentLine.playerColor)return;
    hintUsed=true;hintsUsedCount++;
    var san=currentLine.moves[moveIndex];
    var testGame=new Chess(game.fen());
    var m=testGame.move(san);
    if(m){highlightSquare(m.from,'highlight-hint');highlightSquare(m.to,'highlight-hint');setStatus('Hint: '+san,'info')}
  }

  function explain(){
    if(!currentLine)return;
    var idx=moveIndex;
    if(idx>=currentLine.moves.length)idx=currentLine.moves.length-1;
    if((idx%2===0?'w':'b')!==currentLine.playerColor&&idx>0)idx--;
    var exp=currentLine.explanations[idx];
    $('#explanation-box').text(exp||'No explanation for this move.').fadeIn(200);
  }

  function nextLine(){startDrill()}
  function retryLine(){startDrill(currentLine)}

  function undo(){
    if(isAnimating||!currentLine||moveIndex<=currentLine.baseMoves)return;
    // Undo back to the last position where it was the player's turn
    // Need to undo: the opponent's last auto-move + the player's last move
    var stepsBack=0;
    // If it's currently the player's turn, undo player's last move + opponent's move before it
    var turnColor=moveIndex%2===0?'w':'b';
    if(turnColor===currentLine.playerColor){
      // Player's turn: undo opponent auto-move + player's move = 2 moves
      if(moveIndex>=2){game.undo();game.undo();moveIndex-=2;stepsBack=2}
    }else{
      // Opponent's turn (waiting for auto): undo just player's last move
      if(moveIndex>=1){game.undo();moveIndex-=1;stepsBack=1}
    }
    if(stepsBack>0){
      clearHighlights();clearArrows();selectedSquare=null;
      board.position(game.fen());
      // Rebuild move list
      $('#move-list').html('');
      var tempGame=new Chess();
      for(var i=0;i<moveIndex;i++){
        var m=tempGame.move(currentLine.moves[i]);
        if(m)updateMoveList(m,i);
      }
      moveStartTime=Date.now();
      setStatus('Undone. Try again!','info');
    }
  }

  var SUPABASE_URL='https://oomuupminexahfipgktd.supabase.co';
  var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vbXV1cG1pbmV4YWhmaXBna3RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDE4MzAsImV4cCI6MjA4OTY3NzgzMH0.SrOKNj7mh_UtP_6PdWx4G7gwR98ya56xL_6e0k3Hxrk';
  var moveExplanations={};

  function loadExplanations(){
    fetch(SUPABASE_URL+'/rest/v1/move_explanations?select=line_id,move_index,wrong_move,explanation',{
      headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON}
    }).then(function(r){return r.json()}).then(function(data){
      data.forEach(function(e){
        var key=e.line_id+'|'+e.move_index+'|'+e.wrong_move;
        moveExplanations[key]=e.explanation;
      });
    }).catch(function(){});
  }

  function getWrongMoveExplanation(lineId,moveIdx,wrongSan){
    return moveExplanations[lineId+'|'+moveIdx+'|'+wrongSan]||null;
  }

  function reportError(){
    if(!currentLine)return;
    var report={
      line_id:currentLine.id,
      line_name:currentLine.name,
      move_index:moveIndex,
      fen:game.fen(),
      expected_move:moveIndex<currentLine.moves.length?currentLine.moves[moveIndex]:'(end)',
      user_played:lastUserAttempt||'(none)',
      moves_played:currentLine.moves.slice(0,moveIndex).join(' '),
      status:'pending'
    };
    // Save locally
    var errors=[];
    try{errors=JSON.parse(localStorage.getItem('chess-trainer-errors'))||[]}catch(e){}
    errors.push(report);
    localStorage.setItem('chess-trainer-errors',JSON.stringify(errors));
    // Send to Supabase (CORS-friendly, fire-and-forget)
    fetch(SUPABASE_URL+'/rest/v1/error_reports',{
      method:'POST',headers:{'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON,'Content-Type':'application/json'},
      body:JSON.stringify(report)
    }).then(function(){setStatus('Reported & synced!','correct')}).catch(function(){setStatus('Reported locally!','info')});
    Sound.play('correct');
  }

  function showErrorLog(){
    var el=$('#error-log');
    if(el.is(':visible')){el.slideUp(200);return}
    var errors=[];
    try{errors=JSON.parse(localStorage.getItem('chess-trainer-errors'))||[]}catch(e){}
    // Also load resolutions
    var resolutions={};
    try{resolutions=JSON.parse(localStorage.getItem('chess-trainer-resolutions'))||{}}catch(e){}
    if(!errors.length&&!Object.keys(resolutions).length){$('#error-list').html('<div style="padding:8px;color:#666">No errors reported yet.</div>');el.slideDown(200);return}
    var html='';
    // Show resolutions first (processed errors)
    var resKeys=Object.keys(resolutions);
    if(resKeys.length){
      html+='<div style="color:#00e676;font-size:.8em;font-weight:600;margin:6px 0">Processed</div>';
      resKeys.forEach(function(k){
        var r=resolutions[k];
        var color=r.wasError?'#ffd700':'#00e676';
        var icon=r.wasError?'Fixed':'Not a bug';
        html+='<div style="background:#16213e;padding:8px;margin:3px 0;border-radius:6px;border-left:3px solid '+color+'">';
        html+='<div style="color:'+color+';font-weight:600;font-size:.85em">'+icon+': '+r.lineName+'</div>';
        html+='<div style="color:#aaa;font-size:.8em">'+r.explanation+'</div>';
        html+='</div>';
      });
    }
    // Show pending errors
    var pending=errors.filter(function(e){return e.status==='pending'});
    if(pending.length){
      html+='<div style="color:#ff8a80;font-size:.8em;font-weight:600;margin:6px 0">Pending Review ('+pending.length+')</div>';
    }
    errors.forEach(function(e,i){
      if(e.status!=='pending')return;
      html+='<div style="background:#16213e;padding:8px;margin:3px 0;border-radius:6px;border-left:3px solid #ff8a80">';
      html+='<div style="color:#ff8a80;font-weight:600;font-size:.85em">#'+(i+1)+' '+e.lineName+'</div>';
      html+='<div style="font-size:.8em">Move '+e.moveIndex+' | Expected: <b>'+e.expectedMove+'</b></div>';
      html+='<div style="color:#666;font-size:.75em">'+e.movesPlayed+'</div>';
      html+='<div style="color:#555;font-size:.7em">'+e.timestamp.slice(0,16).replace('T',' ')+'</div>';
      html+='</div>';
    });
    if(!pending.length&&!resKeys.length)html+='<div style="padding:8px;color:#666">All clear!</div>';
    $('#error-list').html(html);
    el.slideDown(200);
  }

  function shareErrors(){
    var errors=[];
    try{errors=JSON.parse(localStorage.getItem('chess-trainer-errors'))||[]}catch(e){}
    var pending=errors.filter(function(e){return e.status==='pending'});
    if(!pending.length){setStatus('No pending errors to share.','info');return}
    var text='Chess Trainer Error Reports:\n\n';
    pending.forEach(function(e,i){
      text+='#'+(i+1)+' '+e.lineName+'\n';
      text+='Move '+e.moveIndex+' | Expected: '+e.expectedMove+'\n';
      text+='Moves: '+e.movesPlayed+'\n';
      text+='FEN: '+e.fen+'\n\n';
    });
    if(navigator.share){
      navigator.share({title:'Chess Trainer Errors',text:text}).catch(function(){});
    }else{
      navigator.clipboard.writeText(text).then(function(){setStatus('Copied to clipboard!','correct')}).catch(function(){
        // Fallback: select all in a textarea
        var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        setStatus('Copied to clipboard!','correct');
      });
    }
  }

  function clearErrors(){
    localStorage.removeItem('chess-trainer-errors');
    localStorage.removeItem('chess-trainer-resolutions');
    $('#error-list').html('<div style="padding:8px;color:#666">Cleared.</div>');
  }

  function showLineSelector(){
    if(lineSelectMode){hideLineSelector();return}
    lineSelectMode=true;
    var lines=getLines();
    var cats=CATEGORIES[currentOpening]||[];
    var html='<h3>'+(currentOpening==='ponziani'?'Ponziani':'Hippo')+' Lines ('+lines.length+')</h3>';
    cats.forEach(function(cat){
      var catLines=lines.filter(function(l){return l.cat===cat.key});
      if(!catLines.length)return;
      html+='<div class="cat-label">'+cat.label+' ('+catLines.length+')</div>';
      catLines.forEach(function(l){
        var ls=getLineStats(l.id);
        var acc=ls.attempts>0?Math.round((ls.perfect/ls.attempts)*100)+'% perfect':'New';
        var stars=ls.mastery>=3?'***':ls.mastery>=2?'**':ls.mastery>=1?'*':'';
        html+='<div class="line-item'+(l.isTrap?' trap':'')+'" onclick="app.selectLine(\''+l.id+'\')">';
        html+='<div class="line-info"><div class="line-title">'+l.name+'</div>';
        if(l.isTrap)html+='<span class="line-tag">TRAP</span>';
        html+='</div>';
        if(stars)html+='<span class="stars">'+stars+'</span>';
        html+='<span class="line-acc">'+acc+'</span></div>';
      });
    });
    $('#line-selector').html(html).slideDown(200);
  }

  function hideLineSelector(){lineSelectMode=false;$('#line-selector').slideUp(200)}

  function selectLine(id){
    var line=ALL_LINES.find(function(l){return l.id===id});
    if(line)startDrill(line);
  }

  var defaultControls='<button class="btn-hint" onclick="app.hint()">Hint</button><button class="btn-explain" onclick="app.explain()">Why?</button><button class="btn-undo" onclick="app.undo()">Undo</button><button class="btn-menu" onclick="app.showLineSelector()">Lines</button><button class="btn-report" onclick="app.reportError()">Report</button><button class="btn-report" onclick="app.showErrorLog()">Errors</button>';
  function hideResult(){$('#result-screen').hide();$('#drill-controls').html(defaultControls).show()}

  function setStatus(msg,cls){$('#status').text(msg).attr('class',cls||'neutral')}

  function highlightSquare(sq,cls){$('#board .square-55d63[data-square="'+sq+'"]').addClass(cls)}
  function highlightLastMove(m){clearHighlights();if(m){highlightSquare(m.from,'highlight-last');highlightSquare(m.to,'highlight-last')}}
  function clearHighlights(){clearArrows();$('#board .square-55d63').removeClass('highlight-last highlight-hint highlight-selected highlight-legal highlight-legal-capture')}

  function updateMoveList(m,idx){
    var list=$('#move-list');
    var num=Math.floor(idx/2)+1;
    var san=m.san||m;
    if(idx%2===0)list.append('<span class="move-number">'+num+'.</span> <span class="white-move">'+san+'</span> ');
    else list.append('<span class="black-move">'+san+'</span> ');
    list.scrollTop(list[0].scrollHeight);
  }

  function updateSessionStats(){
    var acc=sessionTotal>0?Math.round((sessionCorrect/sessionTotal)*100):0;
    $('#stat-accuracy').text(sessionTotal>0?acc+'%':'--');
    $('#stat-completed').text(sessionCompleted);
    $('#stat-streak').text(perfectStreak);
    $('#accuracy-fill').css('width',(sessionTotal>0?acc:0)+'%');
    $('#stat-speed').text(sessionMoveCount>0?(sessionMoveTimeTotal/sessionMoveCount).toFixed(1)+'s/move':'--');
  }

  function updateXPDisplay(){
    var p=loadProfile();
    var lvl=getLevel(p.xp);
    var nextLvl=lvl<LEVELS.length-1?LEVELS[lvl+1].xp:LEVELS[lvl].xp;
    var currLvlXP=LEVELS[lvl].xp;
    var progress=nextLvl>currLvlXP?Math.round(((p.xp-currLvlXP)/(nextLvl-currLvlXP))*100):100;
    $('#level-num').text(lvl+1);
    $('#level-name').text(LEVELS[lvl].name);
    $('#xp-fill').css('width',progress+'%');
    $('#xp-text').text(p.xp+' / '+nextLvl+' XP');
  }

  function updateDailyStreakDisplay(){
    var p=loadProfile();
    if(p.dailyStreak>1){
      $('#streak-badge').show();
      $('#streak-count').text(p.dailyStreak);
    }else{
      $('#streak-badge').hide();
    }
  }

  $(document).ready(function(){init()});

  return{switchOpening:switchOpening,hint:hint,explain:explain,nextLine:nextLine,retryLine:retryLine,showLineSelector:showLineSelector,selectLine:selectLine,undo:undo,reportError:reportError,showErrorLog:showErrorLog,shareErrors:shareErrors,clearErrors:clearErrors};
})();
</script>
</body>

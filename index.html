<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chess Opening Trainer</title>
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
#app { max-width: 500px; margin: 0 auto; padding: 8px; }
header { text-align: center; padding: 8px 0; }
h1 { font-size: 1.1em; margin-bottom: 8px; color: #e94560; }
.tab-bar { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; }
.tab-bar button { padding: 8px 16px; border: 2px solid #e94560; background: transparent; color: #eee; border-radius: 20px; font-size: 0.9em; cursor: pointer; transition: all 0.2s; }
.tab-bar button.active { background: #e94560; color: #fff; }
#line-name { font-size: 0.85em; color: #aaa; text-align: center; min-height: 1.3em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#board-wrapper { position: relative; width: 100%; margin: 0 auto; }
#board { width: 100%; }
.highlight-last { box-shadow: inset 0 0 0 3px #e94560 !important; }
.highlight-hint { box-shadow: inset 0 0 0 4px #00d2ff !important; }
.highlight-selected { box-shadow: inset 0 0 0 3px #ffd700 !important; }
.highlight-legal { background: radial-gradient(circle, rgba(0,210,255,0.4) 25%, transparent 25%) !important; }
#status { text-align: center; padding: 10px 8px; font-size: 1em; min-height: 2.8em; display: flex; align-items: center; justify-content: center; }
#status.correct { color: #00e676; }
#status.wrong { color: #ff5252; }
#status.info { color: #64b5f6; }
#status.neutral { color: #aaa; }
.controls { display: flex; gap: 6px; justify-content: center; padding: 4px 0; flex-wrap: wrap; }
.controls button { padding: 10px 14px; border: none; border-radius: 8px; font-size: 0.85em; cursor: pointer; transition: all 0.15s; font-weight: 600; }
.btn-hint { background: #0f3460; color: #00d2ff; }
.btn-explain { background: #1a1a4e; color: #bb86fc; }
.btn-next { background: #e94560; color: #fff; }
.btn-retry { background: #533483; color: #fff; }
.btn-menu { background: #16213e; color: #aaa; }
.controls button:active { transform: scale(0.95); opacity: 0.8; }
#move-list { padding: 8px; margin: 8px 0; background: #16213e; border-radius: 8px; font-size: 0.8em; min-height: 2em; line-height: 1.6; color: #aaa; max-height: 80px; overflow-y: auto; }
#move-list .move-number { color: #666; }
#move-list .white-move { color: #ddd; }
#move-list .black-move { color: #bbb; }
#move-list .current-move { color: #e94560; font-weight: bold; }
#explanation-box { display: none; padding: 10px; margin: 6px 0; background: #1a1a4e; border-left: 3px solid #bb86fc; border-radius: 0 8px 8px 0; font-size: 0.85em; color: #bb86fc; }
#stats-panel { padding: 10px; margin: 8px 0; background: #16213e; border-radius: 8px; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 0.8em; }
.stats-label { color: #888; }
.stats-value { color: #eee; font-weight: 600; }
.accuracy-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.accuracy-fill { height: 100%; background: linear-gradient(90deg, #e94560, #00e676); border-radius: 3px; transition: width 0.5s; }
#line-selector { display: none; padding: 8px; }
#line-selector h3 { font-size: 0.9em; color: #e94560; margin-bottom: 8px; }
.line-item { padding: 10px; margin: 4px 0; background: #16213e; border-radius: 8px; cursor: pointer; font-size: 0.82em; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
.line-item:active { background: #1a1a4e; }
.line-item .line-acc { font-size: 0.75em; color: #888; }
.line-item.trap { border-left: 3px solid #ff5252; }
.line-item.trap .line-tag { color: #ff5252; font-size: 0.7em; }
#result-screen { display: none; text-align: center; padding: 20px 10px; }
#result-screen h2 { color: #e94560; margin-bottom: 8px; }
#result-screen p { color: #aaa; font-size: 0.9em; margin-bottom: 4px; }
.result-stat { font-size: 1.5em; font-weight: bold; margin: 10px 0; }
.result-stat.perfect { color: #00e676; }
.result-stat.good { color: #ffd700; }
.result-stat.needs-work { color: #ff5252; }
@media (max-width: 500px) { #app { padding: 4px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Chess Opening Trainer</h1>
    <div class="tab-bar">
      <button id="tab-ponziani" class="active" onclick="app.switchOpening('ponziani')">Ponziani (White)</button>
      <button id="tab-hippo" onclick="app.switchOpening('hippo')">Hippo (Black)</button>
    </div>
  </header>
  <div id="line-name"></div>
  <div id="board-wrapper"><div id="board"></div></div>
  <div id="status" class="neutral">Tap a piece to make your move</div>
  <div id="explanation-box"></div>
  <div class="controls" id="drill-controls">
    <button class="btn-hint" onclick="app.hint()">Hint</button>
    <button class="btn-explain" onclick="app.explain()">Why?</button>
    <button class="btn-next" onclick="app.nextLine()" style="display:none" id="btn-next">Next Line</button>
    <button class="btn-retry" onclick="app.retryLine()" style="display:none" id="btn-retry">Retry</button>
    <button class="btn-menu" onclick="app.showLineSelector()">Lines</button>
  </div>
  <div id="move-list"></div>
  <div id="stats-panel">
    <div class="stats-row"><span class="stats-label">Session Accuracy</span><span class="stats-value" id="stat-accuracy">—</span></div>
    <div class="stats-row"><span class="stats-label">Lines Completed</span><span class="stats-value" id="stat-completed">0</span></div>
    <div class="stats-row"><span class="stats-label">Current Streak</span><span class="stats-value" id="stat-streak">0</span></div>
    <div class="accuracy-bar"><div class="accuracy-fill" id="accuracy-fill" style="width:0%"></div></div>
  </div>
  <div id="line-selector"></div>
  <div id="result-screen">
    <h2 id="result-title"></h2>
    <p id="result-desc"></p>
    <div class="result-stat" id="result-accuracy"></div>
    <p id="result-detail"></p>
    <div class="controls" style="margin-top:12px">
      <button class="btn-retry" onclick="app.retryLine()">Retry This Line</button>
      <button class="btn-next" onclick="app.nextLine()">Next Line</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

const ALL_LINES = [
  ...PONZIANI_LINES.map(l => ({...l, opening: 'ponziani', playerColor: 'w', baseMoves: 5})),
  ...HIPPO_LINES.map(l => ({...l, opening: 'hippo', playerColor: 'b', baseMoves: 0}))
];

// ===================== SPACED REPETITION =====================

function loadStats() {
  try { return JSON.parse(localStorage.getItem('chess-trainer-stats')) || {}; } catch(e) { return {}; }
}
function saveStats(stats) {
  localStorage.setItem('chess-trainer-stats', JSON.stringify(stats));
}
function getLineStats(lineId) {
  var s = loadStats();
  return s[lineId] || { attempts: 0, correct: 0, weight: 1.0, lastAttempt: 0 };
}
function updateLineStats(lineId, totalMoves, correctMoves) {
  var s = loadStats();
  var ls = s[lineId] || { attempts: 0, correct: 0, weight: 1.0, lastAttempt: 0 };
  ls.attempts++;
  ls.correct += (correctMoves === totalMoves ? 1 : 0);
  var accuracy = correctMoves / Math.max(totalMoves, 1);
  if (accuracy === 1) ls.weight = Math.max(0.2, ls.weight - 0.15);
  else if (accuracy >= 0.7) ls.weight = Math.max(0.3, ls.weight - 0.05);
  else ls.weight += 0.4;
  ls.lastAttempt = Date.now();
  s[lineId] = ls;
  saveStats(s);
}
function selectWeightedLine(lines) {
  var weights = lines.map(function(l) { return getLineStats(l.id).weight; });
  var total = weights.reduce(function(a,b) { return a+b; }, 0);
  var r = Math.random() * total;
  var cum = 0;
  for (var i = 0; i < weights.length; i++) {
    cum += weights[i];
    if (r <= cum) return lines[i];
  }
  return lines[lines.length - 1];
}

// ===================== APP =====================

var app = (function() {
  var board, game, currentLine, moveIndex, selectedSquare;
  var playerMoveCount, playerCorrectCount, hintUsed;
  var sessionCorrect = 0, sessionTotal = 0, sessionCompleted = 0, streak = 0;
  var currentOpening = 'ponziani';
  var isAnimating = false;
  var lineSelectMode = false;

  function init() {
    game = new Chess();
    board = Chessboard('board', {
      draggable: true,
      position: 'start',
      pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd
    });
    $(window).on('resize', function() { board.resize(); });
    $('#board').on('click', '.square-55d63', handleSquareClick);
    startDrill();
  }

  function handleSquareClick(e) {
    if (isAnimating) return;
    var sq = $(e.currentTarget).attr('data-square');
    if (!sq) return;
    var turn = game.turn();
    if (currentLine && turn !== currentLine.playerColor) return;
    if (selectedSquare) {
      var expectedSan = currentLine.moves[moveIndex];
      tryMove(selectedSquare, sq, expectedSan);
      clearHighlights();
      selectedSquare = null;
    } else {
      var piece = game.get(sq);
      if (piece && piece.color === currentLine.playerColor) {
        selectedSquare = sq;
        highlightSquare(sq, 'highlight-selected');
        var moves = game.moves({ square: sq, verbose: true });
        moves.forEach(function(m) { highlightSquare(m.to, 'highlight-legal'); });
      }
    }
  }

  function switchOpening(op) {
    currentOpening = op;
    $('#tab-ponziani').toggleClass('active', op === 'ponziani');
    $('#tab-hippo').toggleClass('active', op === 'hippo');
    hideLineSelector();
    startDrill();
  }

  function getLines() {
    return ALL_LINES.filter(function(l) { return l.opening === currentOpening; });
  }

  function startDrill(specificLine) {
    hideResult();
    hideLineSelector();
    game.reset();
    clearHighlights();
    selectedSquare = null;
    hintUsed = false;
    playerMoveCount = 0;
    playerCorrectCount = 0;
    moveIndex = 0;
    currentLine = specificLine || selectWeightedLine(getLines());
    var orient = currentLine.playerColor === 'w' ? 'white' : 'black';
    board.orientation(orient);
    board.position('start');
    $('#line-name').text(currentLine.name);
    $('#move-list').html('');
    $('#explanation-box').hide();
    $('#btn-next').hide();
    $('#btn-retry').hide();
    setStatus('Setting up position...', 'info');
    setTimeout(function() { playBaseMoves(); }, 300);
  }

  function playBaseMoves() {
    if (moveIndex < currentLine.baseMoves && moveIndex < currentLine.moves.length) {
      isAnimating = true;
      var san = currentLine.moves[moveIndex];
      var m = game.move(san);
      if (!m) { console.error('Invalid base move:', san, 'at index', moveIndex, 'fen:', game.fen()); moveIndex++; playBaseMoves(); return; }
      updateMoveList(m, moveIndex);
      board.position(game.fen(), false);
      moveIndex++;
      setTimeout(function() { playBaseMoves(); }, 150);
    } else {
      isAnimating = false;
      playNextAutoOrWait();
    }
  }

  function playNextAutoOrWait() {
    if (moveIndex >= currentLine.moves.length) {
      finishLine();
      return;
    }
    var san = currentLine.moves[moveIndex];
    var turnColor = moveIndex % 2 === 0 ? 'w' : 'b';
    if (turnColor !== currentLine.playerColor) {
      isAnimating = true;
      setTimeout(function() {
        var m = game.move(san);
        if (!m) { console.error('Invalid auto move:', san, 'at index', moveIndex, 'fen:', game.fen()); finishLine(); return; }
        board.position(game.fen());
        highlightLastMove(m);
        updateMoveList(m, moveIndex);
        moveIndex++;
        isAnimating = false;
        playNextAutoOrWait();
      }, 400);
    } else {
      setStatus('Your turn — find the best move!', 'neutral');
    }
  }

  function onDragStart(source, piece) {
    if (isAnimating) return false;
    if (!currentLine) return false;
    if (game.turn() !== currentLine.playerColor) return false;
    if (moveIndex >= currentLine.moves.length) return false;
    if ((currentLine.playerColor === 'w' && piece.search(/^b/) !== -1) ||
        (currentLine.playerColor === 'b' && piece.search(/^w/) !== -1)) return false;
    return true;
  }

  function onDrop(source, target) {
    clearHighlights();
    selectedSquare = null;
    if (isAnimating) return 'snapback';
    var expectedSan = currentLine.moves[moveIndex];
    return tryMove(source, target, expectedSan);
  }

  function onSnapEnd() {
    board.position(game.fen());
  }

  function tryMove(source, target, expectedSan) {
    var testGame = new Chess(game.fen());
    var expectedMove = testGame.move(expectedSan);
    if (!expectedMove) { console.error('Expected move invalid:', expectedSan); return 'snapback'; }
    testGame.undo();
    var userMove = testGame.move({ from: source, to: target, promotion: 'q' });
    if (!userMove) return 'snapback';
    playerMoveCount++;
    if (userMove.san === expectedMove.san) {
      game.move(expectedSan);
      board.position(game.fen());
      highlightLastMove(expectedMove);
      updateMoveList(expectedMove, moveIndex);
      playerCorrectCount++;
      sessionCorrect++;
      sessionTotal++;
      moveIndex++;
      setStatus('Correct!', 'correct');
      updateStatsDisplay();
      $('#explanation-box').hide();
      setTimeout(function() { playNextAutoOrWait(); }, 500);
      return;
    } else {
      sessionTotal++;
      setStatus('Not quite. The correct move is ' + expectedSan, 'wrong');
      updateStatsDisplay();
      showCorrectMoveOnBoard(expectedSan);
      return 'snapback';
    }
  }

  function showCorrectMoveOnBoard(san) {
    var testGame = new Chess(game.fen());
    var m = testGame.move(san);
    if (m) {
      highlightSquare(m.from, 'highlight-hint');
      highlightSquare(m.to, 'highlight-hint');
    }
    setTimeout(function() {
      clearHighlights();
      game.move(san);
      board.position(game.fen());
      highlightLastMove(m);
      updateMoveList(m || {san: san}, moveIndex);
      moveIndex++;
      setTimeout(function() { playNextAutoOrWait(); }, 600);
    }, 1500);
  }

  function finishLine() {
    var accuracy = playerMoveCount > 0 ? Math.round((playerCorrectCount / playerMoveCount) * 100) : 100;
    sessionCompleted++;
    streak = accuracy === 100 ? streak + 1 : 0;
    updateLineStats(currentLine.id, playerMoveCount, playerCorrectCount);
    updateStatsDisplay();
    $('#result-title').text(accuracy === 100 ? 'Perfect!' : accuracy >= 70 ? 'Good effort!' : 'Keep practicing!');
    $('#result-desc').text(currentLine.result);
    $('#result-accuracy').text(accuracy + '%').attr('class', 'result-stat ' + (accuracy === 100 ? 'perfect' : accuracy >= 70 ? 'good' : 'needs-work'));
    $('#result-detail').text(playerCorrectCount + '/' + playerMoveCount + ' moves correct' + (hintUsed ? ' (hint used)' : ''));
    $('#result-screen').fadeIn(200);
    $('#drill-controls').hide();
  }

  function hint() {
    if (isAnimating || !currentLine || moveIndex >= currentLine.moves.length) return;
    var turn = moveIndex % 2 === 0 ? 'w' : 'b';
    if (turn !== currentLine.playerColor) return;
    hintUsed = true;
    var san = currentLine.moves[moveIndex];
    var testGame = new Chess(game.fen());
    var m = testGame.move(san);
    if (m) {
      highlightSquare(m.from, 'highlight-hint');
      highlightSquare(m.to, 'highlight-hint');
      setStatus('Hint: ' + san, 'info');
    }
  }

  function explain() {
    if (!currentLine) return;
    var idx = moveIndex;
    if (idx >= currentLine.moves.length) idx = currentLine.moves.length - 1;
    var turn = idx % 2 === 0 ? 'w' : 'b';
    if (turn !== currentLine.playerColor && idx > 0) idx--;
    var exp = currentLine.explanations[idx];
    if (exp) {
      $('#explanation-box').text(exp).fadeIn(200);
    } else {
      $('#explanation-box').text('No explanation available for this move.').fadeIn(200);
    }
  }

  function nextLine() {
    startDrill();
  }

  function retryLine() {
    startDrill(currentLine);
  }

  function showLineSelector() {
    if (lineSelectMode) { hideLineSelector(); return; }
    lineSelectMode = true;
    var lines = getLines();
    var html = '<h3>' + (currentOpening === 'ponziani' ? 'Ponziani' : 'Hippo') + ' Lines</h3>';
    lines.forEach(function(l) {
      var ls = getLineStats(l.id);
      var acc = ls.attempts > 0 ? Math.round((ls.correct / ls.attempts) * 100) + '% perfect' : 'Not tried';
      html += '<div class="line-item' + (l.isTrap ? ' trap' : '') + '" onclick="app.selectLine(\'' + l.id + '\')">';
      html += '<div><div>' + l.name + '</div>' + (l.isTrap ? '<span class="line-tag">TRAP</span>' : '') + '</div>';
      html += '<span class="line-acc">' + acc + '</span></div>';
    });
    $('#line-selector').html(html).slideDown(200);
  }

  function hideLineSelector() {
    lineSelectMode = false;
    $('#line-selector').slideUp(200);
  }

  function selectLine(id) {
    var line = ALL_LINES.find(function(l) { return l.id === id; });
    if (line) startDrill(line);
  }

  function hideResult() {
    $('#result-screen').hide();
    $('#drill-controls').show();
  }

  function setStatus(msg, cls) {
    $('#status').text(msg).attr('class', cls || 'neutral');
  }

  function highlightSquare(sq, cls) {
    var el = $('#board .square-55d63[data-square="' + sq + '"]');
    el.addClass(cls);
  }

  function highlightLastMove(m) {
    clearHighlights();
    if (m) {
      highlightSquare(m.from, 'highlight-last');
      highlightSquare(m.to, 'highlight-last');
    }
  }

  function clearHighlights() {
    $('#board .square-55d63').removeClass('highlight-last highlight-hint highlight-selected highlight-legal');
  }

  function updateMoveList(m, idx) {
    var list = $('#move-list');
    var moveNum = Math.floor(idx / 2) + 1;
    var san = m.san || m;
    if (idx % 2 === 0) {
      list.append('<span class="move-number">' + moveNum + '.</span> <span class="white-move">' + san + '</span> ');
    } else {
      list.append('<span class="black-move">' + san + '</span> ');
    }
    list.scrollTop(list[0].scrollHeight);
  }

  function updateStatsDisplay() {
    var acc = sessionTotal > 0 ? Math.round((sessionCorrect / sessionTotal) * 100) : 0;
    $('#stat-accuracy').text(sessionTotal > 0 ? acc + '%' : '—');
    $('#stat-completed').text(sessionCompleted);
    $('#stat-streak').text(streak);
    $('#accuracy-fill').css('width', (sessionTotal > 0 ? acc : 0) + '%');
  }

  $(document).ready(function() { init(); });

  return {
    switchOpening: switchOpening,
    hint: hint,
    explain: explain,
    nextLine: nextLine,
    retryLine: retryLine,
    showLineSelector: showLineSelector,
    selectLine: selectLine
  };
})();
